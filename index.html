<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xưởng Truyện Tranh AI Đa Vũ Trụ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f1f5f9; }
        .bg-dotted { background-image: radial-gradient(#cbd5e1 2px, transparent 2px); background-size: 30px 30px; }
        .comic-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .comic-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .speech-bubble { position: relative; }
        .speech-bubble::before { content: ''; position: absolute; top: -10px; left: 20px; border-width: 0 10px 10px 0px; border-style: solid; border-color: transparent transparent #eef2ff transparent; }
        .spinner { width: 24px; height: 24px; border: 4px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        [contenteditable="true"]:focus { outline: none; background-color: rgba(255, 255, 255, 0.9); box-shadow: 0 0 0 2px #818cf8; border-radius: 8px; padding: 4px; }
        .speech-bubble[contenteditable="true"]:focus { background-color: #1e293b; color: #fde047; }
    </style>
</head>
<body class="h-screen flex overflow-hidden text-slate-800 flex-col md:flex-row">

    <aside class="w-full md:w-[340px] bg-white border-r border-slate-200 shadow-xl z-20 flex flex-col flex-shrink-0">
        <div class="p-6 border-b border-slate-100 flex items-center gap-4 bg-gradient-to-br from-indigo-50 to-white">
            <div class="w-14 h-14 bg-gradient-to-tr from-indigo-600 to-purple-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                <i class="fa-solid fa-scroll text-2xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-black text-slate-800 leading-tight tracking-tight">XƯỞNG<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">KỊCH BẢN AI</span></h1>
            </div>
        </div>

        <div class="p-6 flex-1 flex flex-col gap-5 overflow-y-auto">
            <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100">
                <label class="block text-sm font-bold text-slate-700 mb-2"><i class="fa-solid fa-key text-amber-500 mr-1"></i> Gemini API Key</label>
                <input type="password" id="apiKey" placeholder="Nhập khóa API..." class="w-full px-4 py-2.5 rounded-xl border border-amber-200 bg-white focus:border-amber-500 focus:ring-4 focus:ring-amber-100 outline-none transition-all text-sm font-mono shadow-sm">
            </div>

            <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                <label class="block text-sm font-bold text-slate-700 mb-2"><i class="fa-solid fa-book text-blue-500 mr-1"></i> Môn học (Nhập thủ công)</label>
                <input type="text" id="subject" value="Toán học" placeholder="Ví dụ: KHTN, Địa lý..." class="w-full px-4 py-2.5 rounded-xl border border-blue-200 bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition-all text-sm font-bold text-slate-700 shadow-sm">
            </div>

            <div class="bg-fuchsia-50 p-4 rounded-2xl border border-fuchsia-100">
                <label class="block text-sm font-bold text-slate-700 mb-2"><i class="fa-brands fa-galactic-republic text-fuchsia-500 mr-1"></i> Vũ Trụ (Nhập tay / Chọn)</label>
                <input type="text" id="universe" list="universe-list" value="Doraemon (Nhóm bạn Nobita, Bảo bối)" placeholder="Ví dụ: Naruto, Dragon Ball..." class="w-full px-4 py-2.5 rounded-xl border border-fuchsia-200 bg-white focus:border-fuchsia-500 focus:ring-4 focus:ring-fuchsia-100 outline-none transition-all text-sm font-bold text-slate-700 shadow-sm">
                <datalist id="universe-list">
                    <option value="Doraemon (Nhóm bạn Nobita, Bảo bối)"></option>
                    <option value="One Piece (Hải tặc, Đồng đội, Truy tìm kho báu)"></option>
                    <option value="Thám tử lừng danh Conan (Suy luận phá án)"></option>
                    <option value="Spider-Man (Đu tơ nhện, siêu anh hùng)"></option>
                    <option value="Batman (Bóng tối, thám tử)"></option>
                    <option value="Harry Potter (Phép thuật, trường Hogwarts)"></option>
                    <option value="Dragon Ball (Hành động, siêu năng lực)"></option>
                </datalist>
            </div>

            <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
                <label class="block text-sm font-bold text-slate-700 mb-2"><i class="fa-solid fa-layer-group text-emerald-500 mr-1"></i> Số lượng Khung (Nhập số)</label>
                <input type="number" id="panelCount" value="4" min="1" max="20" placeholder="Ví dụ: 4, 6, 8..." class="w-full px-4 py-2.5 rounded-xl border border-emerald-200 bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100 outline-none transition-all text-sm font-bold text-slate-700 shadow-sm">
            </div>
            
            <div class="mt-auto text-center text-xs font-bold text-slate-400">
                💡 Mẹo: Nhấp trực tiếp vào chữ trên thẻ để tự do chỉnh sửa!
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative bg-dotted">
        <div class="bg-white/95 backdrop-blur-md p-6 border-b border-slate-200 z-10 shadow-sm sticky top-0">
            <div class="max-w-5xl mx-auto flex flex-col xl:flex-row gap-4 items-stretch">
                <div class="flex-1">
                    <label class="block text-lg font-black text-slate-800 mb-2">Nhập nội dung / Yêu cầu bài học chi tiết:</label>
                    <textarea id="topic" rows="3" placeholder="Nhập kiến thức Toán/KHTN vào đây..." class="w-full px-5 py-3 resize-none rounded-2xl border-2 border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-base font-medium shadow-inner placeholder-slate-400"></textarea>
                </div>
                <div class="flex flex-col justify-end">
                    <button id="generateBtn" onclick="generateComic()" class="h-16 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-black px-8 rounded-2xl shadow-xl shadow-indigo-200 transform transition-all active:scale-95 flex items-center justify-center gap-3 text-lg whitespace-nowrap">
                        🚀 TẠO PROMPT VẼ TRUYỆN
                    </button>
                </div>
            </div>
            <div id="errorMsg" class="hidden mt-4 text-rose-600 text-sm font-bold bg-rose-50 p-4 rounded-xl border-2 border-rose-200 w-full"></div>
        </div>

        <div class="flex-1 overflow-y-auto p-6 md:p-8">
            <div class="max-w-5xl mx-auto">
                <div id="emptyState" class="flex flex-col items-center justify-center h-[40vh] text-slate-400">
                    <i class="fa-solid fa-code text-7xl mb-6 opacity-20"></i>
                    <p class="text-xl font-bold">Trạm điều phối Kịch bản đang chờ dữ liệu...</p>
                </div>
                <div id="resultGrid" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-8 pb-10"></div>
            </div>
        </div>
    </main>

    <script>
        window.onload = () => {
            try {
                const savedKey = localStorage.getItem('gemini_api_key_comic');
                if(savedKey) document.getElementById('apiKey').value = savedKey;
            } catch (e) {
                console.warn("Trình duyệt chặn LocalStorage");
            }
        };

        async function generateComic() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const subject = document.getElementById('subject').value.trim();
            const topic = document.getElementById('topic').value.trim();
            const universe = document.getElementById('universe').value.trim();
            const panelCount = parseInt(document.getElementById('panelCount').value);
            
            const btn = document.getElementById('generateBtn');
            const errorMsg = document.getElementById('errorMsg');
            const resultGrid = document.getElementById('resultGrid');
            const emptyState = document.getElementById('emptyState');

            errorMsg.classList.add('hidden');
            errorMsg.innerHTML = '';

            // Kiểm tra dữ liệu đầu vào
            if (!apiKey) return showError("Vui lòng nhập API Key của Google Gemini!");
            if (!subject) return showError("Bạn chưa nhập Môn học!");
            if (!universe) return showError("Bạn chưa nhập Vũ trụ Truyện tranh!");
            if (!panelCount || panelCount < 1 || panelCount > 20) return showError("Số lượng khung phải từ 1 đến 20!");
            if (!topic) return showError("Bạn chưa nhập Nội dung bài học!");
            
            try { localStorage.setItem('gemini_api_key_comic', apiKey); } catch (e) {}

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner"></span> <span class="ml-2">ĐANG BIÊN DỊCH PROMPT...</span>`;
            btn.classList.add('opacity-90', 'cursor-not-allowed', 'scale-95');
            emptyState.classList.add('hidden');
            resultGrid.innerHTML = ''; 

            const SYSTEM_INSTRUCTION = `
                Bạn là một Biên kịch truyện tranh giáo dục xuất sắc. 
                Viết kịch bản gồm ĐÚNG ${panelCount} khung tranh dựa trên môn học và nội dung người dùng cung cấp.
                PHONG CÁCH BẮT BUỘC: Vũ trụ ${universe}. Lồng ghép kiến thức một cách kịch tính, ly kỳ, hài hước.
                
                YÊU CẦU ĐẶC BIỆT VỀ IMAGE PROMPT (LỆNH VẼ ẢNH):
                Trong câu lệnh vẽ ảnh tiếng Anh, bạn BẮT BUỘC phải thêm yêu cầu vẽ bong bóng thoại (speech bubble) chứa đoạn text (1-5 chữ) tóm tắt lời nhân vật.
                Ví dụ: "..., with a speech bubble containing the text 'Toa do am!'". (Lưu ý: Chữ trong bong bóng nên dùng tiếng Việt không dấu hoặc tiếng Anh để AI vẽ không bị lỗi font).

                RẤT QUAN TRỌNG: Trả về duy nhất 1 mảng JSON chứa đúng ${panelCount} phần tử. KHÔNG bọc thẻ markdown.
                Cấu trúc mỗi phần tử: 
                {
                    "title": "Tên khung", 
                    "imagePrompt": "Lệnh tiếng Anh cho AI vẽ, luôn có chữ ${universe.split('(')[0].trim()} anime manga comic style. BẮT BUỘC chứa câu lệnh vẽ speech bubble.", 
                    "dialogue": "Lời thoại nhân vật chi tiết bằng tiếng Việt có dấu..."
                }
            `;
            const userPrompt = `Bài học: ${topic} (Môn: ${subject}). Tạo ${panelCount} phân cảnh ly kỳ.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [{ text: SYSTEM_INSTRUCTION + "\n\n" + userPrompt }] }],
                        generationConfig: { temperature: 0.8 }
                    })
                });

                const data = await response.json();
                
                if (!response.ok) throw new Error(data.error?.message || `Lỗi kết nối máy chủ Gemini (Status ${response.status})`);

                let textResult = data.candidates[0].content.parts[0].text;
                
                // Lưới lọc JSON cực mạnh
                const firstBracket = textResult.indexOf('[');
                const lastBracket = textResult.lastIndexOf(']');
                if (firstBracket !== -1 && lastBracket !== -1) {
                    textResult = textResult.substring(firstBracket, lastBracket + 1);
                }

                const panels = JSON.parse(textResult);

                resultGrid.classList.remove('hidden');
                renderCards(panels);

            } catch (error) {
                console.error("Chi tiết lỗi:", error);
                showError(`<b>Lỗi phát sinh:</b> ${error.message} <br><small>*Mẹo: Nếu báo lỗi 400 API Key không hợp lệ, thầy hãy kiểm tra lại khoảng trắng thừa khi copy API Key nhé!</small>`);
                emptyState.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `🚀 TẠO PROMPT VẼ TRUYỆN`;
                btn.classList.remove('opacity-90', 'cursor-not-allowed', 'scale-95');
            }
        }

        function renderCards(panels) {
            const resultGrid = document.getElementById('resultGrid');
            const themes = [
                { color: 'border-rose-500', icon: 'fa-bolt text-rose-500', bgIcon: 'bg-rose-100' }, 
                { color: 'border-orange-500', icon: 'fa-fire text-orange-500', bgIcon: 'bg-orange-100' },
                { color: 'border-sky-500', icon: 'fa-magnifying-glass text-sky-500', bgIcon: 'bg-sky-100' },
                { color: 'border-emerald-500', icon: 'fa-check-double text-emerald-500', bgIcon: 'bg-emerald-100' },
                { color: 'border-purple-500', icon: 'fa-mask text-purple-500', bgIcon: 'bg-purple-100' }
            ];

            panels.forEach((panel, index) => {
                const theme = themes[index % themes.length];

                const cardHTML = `
                    <div class="comic-card bg-white rounded-3xl p-6 shadow-lg border-t-8 ${theme.color} flex flex-col h-full relative">
                        <div class="absolute top-4 right-4 bg-slate-100 text-slate-400 font-black text-3xl opacity-30 rounded-xl px-3 py-1">#${index + 1}</div>
                        
                        <div class="flex items-center gap-4 mb-6 pr-12">
                            <div class="w-14 h-14 rounded-xl ${theme.bgIcon} flex items-center justify-center text-2xl shadow-sm"><i class="fa-solid ${theme.icon}"></i></div>
                            <h2 id="title-${index}" contenteditable="true" class="font-black text-xl text-slate-800 outline-none hover:bg-slate-50 p-1 rounded transition-colors w-full">${panel.title}</h2>
                        </div>

                        <div class="mb-6 bg-indigo-50 p-4 rounded-2xl border-2 border-indigo-100 shadow-inner">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-xs font-black text-indigo-800 uppercase tracking-wider"><i class="fa-solid fa-wand-magic-sparkles"></i> Lệnh tạo ảnh</span>
                                <button onclick="copySpecificText('prompt-${index}', this)" class="text-xs bg-indigo-600 hover:bg-indigo-800 text-white px-3 py-1.5 rounded-lg transition-colors font-bold shadow-md"><i class="fa-regular fa-copy"></i> Copy Lệnh</button>
                            </div>
                            <div id="prompt-${index}" contenteditable="true" class="text-sm text-slate-700 font-mono italic p-2 transition-all outline-none focus:bg-white focus:ring-2 focus:ring-indigo-300 rounded leading-relaxed">${panel.imagePrompt}</div>
                        </div>

                        <div class="flex-1 mt-auto flex flex-col justify-end mb-6">
                            <div id="dialogue-${index}" contenteditable="true" class="speech-bubble bg-slate-800 text-yellow-300 p-5 rounded-2xl border border-slate-700 text-base md:text-lg font-bold shadow-md leading-relaxed tracking-wide transition-all">
                                "${panel.dialogue}"
                            </div>
                        </div>

                        <button onclick="copyFullCard(${index}, this)" class="w-full mt-auto py-3 bg-slate-100 hover:bg-slate-800 text-slate-600 hover:text-yellow-400 font-bold rounded-xl transition-colors duration-200 flex justify-center items-center gap-2 border-2 border-slate-200 hover:border-transparent">
                            <i class="fa-regular fa-clipboard"></i> <span>Sao chép toàn bộ Khung ${index + 1}</span>
                        </button>
                    </div>
                `;
                resultGrid.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        function executeCopy(text, btn, successHTML) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                const originalHTML = btn.innerHTML;
                const originalClasses = btn.className;
                
                btn.innerHTML = successHTML;
                btn.className = originalClasses.replace('bg-indigo-600', '').replace('hover:bg-indigo-800', '').replace('bg-slate-100', '').replace('hover:bg-slate-800', '') + " bg-emerald-500 text-white border-transparent";
                
                setTimeout(() => { 
                    btn.innerHTML = originalHTML; 
                    btn.className = originalClasses; 
                }, 2000);
            } catch (err) {
                alert("Lỗi sao chép!");
            }
            document.body.removeChild(textArea);
        }

        function copySpecificText(elementId, btn) {
            const text = document.getElementById(elementId).innerText.trim();
            executeCopy(text, btn, `<i class="fa-solid fa-check"></i> Đã chép Lệnh!`);
        }

        function copyFullCard(index, btn) {
            const title = document.getElementById(`title-${index}`).innerText.trim();
            const prompt = document.getElementById(`prompt-${index}`).innerText.trim();
            let dialogue = document.getElementById(`dialogue-${index}`).innerText.trim();
            
            if(dialogue.startsWith('"') && dialogue.endsWith('"')) {
                dialogue = dialogue.substring(1, dialogue.length - 1);
            }

            const copyText = `[${title}]\n- LỆNH VẼ ẢNH: ${prompt}\n- LỜI THOẠI: ${dialogue}`;
            executeCopy(copyText, btn, `<i class="fa-solid fa-check"></i> Đã chép Khung ${index + 1}!`);
        }

        function showError(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${msg}`;
            errorEl.classList.remove('hidden');
        }
    </script>
</body>
</html>
